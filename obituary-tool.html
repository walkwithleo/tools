<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obituary Writer — Leo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary:       #F15F4F;
    --primary-light: #F68F77;
    --primary-tint:  #FDECEA;
    --primary-deep:  #C94B3B;
    --bg:            #ECE7E4;
    --card:          #FFFFFF;
    --dark:          #2C2A26;
    --mid:           #4A4440;
    --muted:         #7A706A;
    --border:        #C8BFB9;
    --border-focus:  #F15F4F;

    /* ── Typography scale — adjust these numbers to resize the whole form ── */
    --size-label:  17px;
    --size-hint:   15px;
    --size-input:  16px;
    --size-body:   16px;
    --size-step:   24px;
    --size-small:  13px;
    --size-tiny:   11px;

    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body:    Georgia, 'Times New Roman', serif;

    /* ── Logo size — adjust this to resize the logo ── */
    --logo-height: 160px;
  }

  body { font-family: var(--font-body); background: var(--bg); color: var(--dark); min-height: 100vh; padding: 2.5rem 1.5rem 3rem; }

  /* ── Header — left justified, aligned with card ── */
  .header { max-width: 600px; margin: 0 auto 1.75rem auto; text-align: left; }
  .header-logo { margin-bottom: 1rem; }
  .header-logo img { height: var(--logo-height); width: auto; display: block; }
  .header h1 { font-family: var(--font-display); font-size: 30px; font-weight: 600; margin-bottom: 0.4rem; }
  .header p { font-family: var(--font-display); font-size: 17px; color: var(--mid); font-style: italic; }

  .progress { display: flex; justify-content: center; align-items: center; gap: 4px; margin-bottom: 2rem; flex-wrap: wrap; }
  .progress-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: default; background: var(--border); color: var(--muted); transition: all 0.2s; }
  .progress-dot.active { background: var(--primary); color: #fff; }
  .progress-dot.done { background: var(--primary); color: #fff; opacity: 0.6; cursor: pointer; }
  .progress-line { width: 16px; height: 1px; background: var(--border); opacity: 0.6; }
  .progress-line.done { background: var(--primary); opacity: 0.6; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 2.25rem 2.25rem 2rem; max-width: 600px; margin: 0 auto; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card.wide { max-width: 660px; }

  .step-label { font-size: var(--size-tiny); letter-spacing: 0.15em; color: var(--primary); text-transform: uppercase; margin-bottom: 0.4rem; font-weight: 700; }
  .step-title { font-family: var(--font-display); font-size: var(--size-step); font-weight: 600; margin-bottom: 1.75rem; color: var(--dark); }

  .field { margin-bottom: 1.5rem; }
  .field label { display: block; font-size: var(--size-label); font-weight: 700; color: var(--dark); margin-bottom: 5px; }
  .field .hint { font-size: var(--size-hint); color: var(--mid); margin-bottom: 9px; line-height: 1.55; }

  input[type=text], input[type=url], textarea, select {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: var(--size-input); font-family: var(--font-body);
    background: #FDFBF9; color: var(--dark);
    outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=url]:focus, textarea:focus, select:focus { border-color: var(--border-focus); }
  textarea { resize: vertical; line-height: 1.65; }

  .date-location-block { margin-bottom: 1.5rem; }
  .date-location-block > label { display: block; font-size: var(--size-label); font-weight: 700; color: var(--dark); margin-bottom: 5px; }
  .date-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; }
  .date-row select { padding: 12px 10px; }
  .date-month { flex: 2; }
  .date-day   { flex: 1; }
  .date-year  { flex: 1.5; }

  .age-display { font-size: var(--size-hint); color: var(--muted); font-style: italic; margin-bottom: 1.5rem; }

  .banner, .thought-note { background: var(--primary-tint); border-radius: 8px; padding: 13px 16px; margin-bottom: 1.5rem; font-size: var(--size-hint); color: var(--primary-deep); line-height: 1.6; }
  .skip-note { font-size: var(--size-hint); color: var(--mid); margin-bottom: 1.5rem; line-height: 1.6; }

  .radio-card { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; }
  .radio-card:hover { border-color: var(--primary-light); }
  .radio-card.selected { border-color: var(--primary); background: var(--primary-tint); }
  .radio-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; border: 2px solid var(--border); background: transparent; transition: all 0.15s; }
  .radio-card.selected .radio-dot { border-color: var(--primary); background: var(--primary); }
  .radio-label { font-size: var(--size-label); font-weight: 600; color: var(--dark); }
  .radio-desc  { font-size: var(--size-hint); color: var(--mid); margin-top: 3px; line-height: 1.45; }

  .radio-inline { display: flex; gap: 24px; margin-top: 10px; }
  .radio-inline label { display: flex; align-items: center; gap: 8px; font-size: var(--size-hint); color: var(--mid); cursor: pointer; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .btn-back { padding: 11px 22px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--mid); font-size: var(--size-body); font-family: var(--font-body); cursor: pointer; transition: all 0.15s; }
  .btn-back:hover { border-color: var(--primary); color: var(--primary); }
  .btn-back.hidden { visibility: hidden; }
  .btn-next { padding: 12px 28px; border-radius: 8px; border: none; background: var(--primary); color: #fff; font-size: var(--size-body); font-family: var(--font-body); cursor: pointer; font-weight: 600; transition: background 0.15s; }
  .btn-next:hover { background: var(--primary-deep); }
  .btn-next:disabled { background: var(--muted); cursor: default; }

  .err { color: var(--primary); font-size: var(--size-hint); margin-top: 0.75rem; text-align: right; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .output-area { width: 100%; min-height: 440px; padding: 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; font-family: var(--font-body); background: #FDFBF9; color: var(--dark); outline: none; resize: vertical; line-height: 1.9; }
  .output-area:focus { border-color: var(--border-focus); }

  .btn-group { display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }
  .btn-primary { padding: 12px 24px; border-radius: 8px; border: none; background: var(--primary); color: #fff; font-size: var(--size-body); font-family: var(--font-body); cursor: pointer; font-weight: 600; transition: background 0.15s; }
  .btn-primary:hover { background: var(--primary-deep); }
  .btn-secondary { padding: 12px 24px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--mid); font-size: var(--size-body); font-family: var(--font-body); cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
  .btn-ghost { padding: 12px 24px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: var(--size-body); font-family: var(--font-body); cursor: pointer; }

  .output-note { font-size: var(--size-hint); color: var(--mid); margin-top: 1.5rem; line-height: 1.65; border-top: 1px solid var(--border); padding-top: 1.25rem; }
  .footer-note { text-align: center; font-size: var(--size-small); color: var(--muted); margin-top: 1.5rem; font-style: italic; }
  .restored-msg { text-align: center; margin-bottom: 0.75rem; font-size: var(--size-small); color: var(--primary); font-style: italic; }

  @media (max-width: 520px) {
    body { padding: 1.5rem 1rem 2rem; }
    .card { padding: 1.5rem 1.25rem; }
    .date-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div id="restored-msg" class="restored-msg" style="display:none">Your previous progress has been restored.</div>

<div class="header">
  <div class="header-logo">
    <img src="https://raw.githubusercontent.com/walkwithleo/tools/main/LEO_Logo_Orange.png" alt="Leo" />
  </div>
  <h1 id="page-title">Obituary writer</h1>
  <p id="page-subtitle">Answer what you can. Skip what you can't. We'll build something from what you give us.</p>
</div>

<div class="progress" id="progress"></div>
<div id="main"></div>
<p class="footer-note" id="footer-note">Your progress saves automatically. Nothing you enter is shared or stored beyond this device.</p>

<script>
const STEP_NAMES = ["The basics","Family","Their life","Who they were","How they spent their time","Preferences"];
const STORAGE_KEY = "leo-obit-v6";
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const TODAY = new Date();
const MAX_YEAR = TODAY.getFullYear();
const MIN_YEAR = MAX_YEAR - 125;

const INIT = {
  fullName:"",nickname:"",
  dobMonth:"",dobDay:"",dobYear:"",birthPlace:"",
  dodMonth:"",dodDay:"",dodYear:"",deathPlace:"",
  city:"",howRaised:"",
  hasSpouse:"",spouse:"",spouseStatus:"surviving",howMet:"",
  hasChildren:"",children:"",grandchildren:"",
  siblings:"",parents:"",precededBy:"",otherFamily:"",
  education:"",career:"",
  description:"",ordinaryDay:"",quote:"",
  freeTime:"",memory:"",remember:"",closingStatement:"",donation:"",
  tone:"warm",length:"standard"
};

let state = { step:0, form:{...INIT}, obit:"" };

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){} }
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const s = JSON.parse(raw); if (s.form) { state = s; return true; } }
  } catch(e){}
  return false;
}

function calcAge() {
  const f = state.form;
  if (!f.dobYear||!f.dobMonth||!f.dobDay||!f.dodYear||!f.dodMonth||!f.dodDay) return null;
  const b = new Date(+f.dobYear, +f.dobMonth-1, +f.dobDay);
  const d = new Date(+f.dodYear, +f.dodMonth-1, +f.dodDay);
  if (d - b < 0) return null;
  let y = d.getFullYear() - b.getFullYear();
  const m = d.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && d.getDate() < b.getDate())) y--;
  return y;
}

function formatDate(month, day, year) {
  const parts = [];
  if (month) parts.push(MONTHS[+month-1]);
  if (day) parts.push(day);
  if (year) parts.push(year);
  return parts.join(" ");
}

function ageGroup(age) {
  if (age===null) return "adult";
  if (age<1) return "infant";
  if (age<=12) return "child";
  if (age<=17) return "teen";
  if (age<=25) return "youngadult";
  return "adult";
}

function set(k,v) { state.form[k]=v; save(); }

function el(tag,attrs,...children) {
  const e=document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v])=>{
    if (k==="class") e.className=v;
    else if (k==="for") e.htmlFor=v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if (typeof c==="string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

function inp(f,placeholder) {
  const i=el("input",{type:"text",placeholder});
  i.value=state.form[f]||"";
  i.addEventListener("input",()=>set(f,i.value));
  return i;
}

function ta(f,placeholder,rows=3) {
  const t=el("textarea",{rows,placeholder});
  t.value=state.form[f]||"";
  t.addEventListener("input",()=>set(f,t.value));
  return t;
}

function dateSelects(prefix) {
  const wrap = el("div",{"class":"date-row"});
  const mSel = el("select",{"class":"date-month"});
  const mOpt = el("option",{}); mOpt.value=""; mOpt.textContent="Month"; mSel.appendChild(mOpt);
  MONTHS.forEach((m,i)=>{ const o=el("option",{}); o.value=String(i+1); o.textContent=m; if(state.form[prefix+"Month"]===String(i+1)) o.selected=true; mSel.appendChild(o); });
  mSel.addEventListener("change",()=>{ set(prefix+"Month",mSel.value); updateAge(); });
  const dSel = el("select",{"class":"date-day"});
  const dOpt = el("option",{}); dOpt.value=""; dOpt.textContent="Day"; dSel.appendChild(dOpt);
  for(let i=1;i<=31;i++){ const o=el("option",{}); o.value=String(i); o.textContent=String(i); if(state.form[prefix+"Day"]===String(i)) o.selected=true; dSel.appendChild(o); }
  dSel.addEventListener("change",()=>{ set(prefix+"Day",dSel.value); updateAge(); });
  const ySel = el("select",{"class":"date-year"});
  const yOpt = el("option",{}); yOpt.value=""; yOpt.textContent="Year"; ySel.appendChild(yOpt);
  for(let y=MAX_YEAR;y>=MIN_YEAR;y--){ const o=el("option",{}); o.value=String(y); o.textContent=String(y); if(state.form[prefix+"Year"]===String(y)) o.selected=true; ySel.appendChild(o); }
  ySel.addEventListener("change",()=>{ set(prefix+"Year",ySel.value); updateAge(); });
  wrap.appendChild(mSel); wrap.appendChild(dSel); wrap.appendChild(ySel);
  return wrap;
}

function dateLocationBlock(labelText, prefix, locationKey, locationPlaceholder) {
  const wrap = el("div",{"class":"date-location-block"});
  const lbl = el("label",{}); lbl.textContent = labelText; wrap.appendChild(lbl);
  wrap.appendChild(dateSelects(prefix));
  const locInp = el("input",{type:"text", placeholder: locationPlaceholder});
  locInp.style.cssText="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:var(--size-input);font-family:var(--font-body);background:#FDFBF9;color:var(--dark);outline:none;transition:border-color 0.15s;";
  locInp.value = state.form[locationKey]||"";
  locInp.addEventListener("input",()=>set(locationKey,locInp.value));
  locInp.addEventListener("focus",()=>locInp.style.borderColor="var(--border-focus)");
  locInp.addEventListener("blur",()=>locInp.style.borderColor="var(--border)");
  wrap.appendChild(locInp);
  return wrap;
}

function updateAge() {
  const ad = document.getElementById("age-display");
  if (!ad) return;
  const age = calcAge();
  if (age !== null) { ad.textContent=`Age at passing: ${age===0?"under 1 year":age}`; ad.style.display="block"; }
  else { ad.style.display="none"; }
}

function field(labelText,hintText,inputEl) {
  const d=el("div",{"class":"field"});
  if (labelText) { const l=el("label",{}); l.textContent=labelText; d.appendChild(l); }
  if (hintText)  { const h=el("div",{"class":"hint"}); h.textContent=hintText; d.appendChild(h); }
  if (inputEl)   d.appendChild(inputEl);
  return d;
}

function radioCard(fk,value,labelText,descText) {
  const d=el("div",{"class":state.form[fk]===value?"radio-card selected":"radio-card"});
  const dot=el("div",{"class":"radio-dot"});
  const txt=el("div",{});
  const lbl=el("div",{"class":"radio-label"}); lbl.textContent=labelText;
  const dsc=el("div",{"class":"radio-desc"}); dsc.textContent=descText;
  txt.appendChild(lbl); txt.appendChild(dsc);
  d.appendChild(dot); d.appendChild(txt);
  d.addEventListener("click",()=>{ set(fk,value); render(); });
  return d;
}

function buildPrompt() {
  const f=state.form;
  const age=calcAge();
  const dob=formatDate(f.dobMonth,f.dobDay,f.dobYear);
  const dod=formatDate(f.dodMonth,f.dodDay,f.dodYear);
  const toneMap={
    warm:"warm, personal, and conversational — written as if by someone who deeply loved them",
    traditional:"traditional, reverent, and formal — appropriate for print in a newspaper",
    simple:"simple, honest, and quietly dignified — no flourishes, lets the details speak"
  };
  const lenMap={brief:"approximately 150–200 words",standard:"approximately 250–350 words",full:"approximately 400–500 words"};

  return `You are helping a grieving family write an obituary. Write with care, warmth, and specificity. Write in third person.

CRITICAL RULES — READ BEFORE WRITING:
1. NEVER invent, assume, or infer any fact not explicitly provided below. If a detail is missing, omit it entirely. Do not fill gaps with plausible-sounding information.
2. NEVER characterize the manner, circumstances, or setting of death. Do not use words like "peacefully," "suddenly," "surrounded by family," or "after a long illness" unless the family explicitly provided those exact words.
3. NEVER add editorial bridge sentences or emotional interpretations beyond what the family provided. Do not write things like "this lesson would shape everything about the woman she became."
4. NEVER rewrite or paraphrase the family's closing statement. If provided, reproduce it VERBATIM as the final paragraph — exact words, exact punctuation.
5. NEVER state a duration (years of marriage, years in a career) unless the family explicitly provided that number.
6. ONLY use details the family gave you. When in doubt, leave it out.

${age!==null?`Age at passing: ${age===0?"under 1 year old (infant)":age} (calculated from provided dates)`:""}

BASICS
Full name: ${f.fullName}
${f.nickname?`Known as: ${f.nickname}`:""}
${dob?`Date of birth: ${dob}`:""}
${f.birthPlace?`Place of birth: ${f.birthPlace}`:""}
${dod?`Date of passing: ${dod}`:""}
${f.deathPlace?`Place of passing: ${f.deathPlace}`:""}
${f.city?`Lived in: ${f.city}`:""}
${f.parents?`Parents: ${f.parents}`:""}
${f.howRaised?`How they were raised: ${f.howRaised}`:""}

BIRTH PARAGRAPH INSTRUCTION: In the opening paragraph, introduce the person by full name, date of passing, place of passing, and age (if available). In the second sentence, include their date of birth, place of birth, and parents by name — if all three are provided. This is standard obituary structure and grounds the reader immediately.

SPOUSE — Introduce the spouse early, within the first 2-3 paragraphs, as part of who they were — not just in the survivor listing. Use all marriage details provided. Include duration of marriage only if explicitly stated by the family.
${f.spouse?`${f.spouseStatus==="surviving"?"Spouse (surviving)":"Spouse (preceded them in death)"}: ${f.spouse}`:"No spouse provided"}
${f.howMet?`Marriage details: ${f.howMet}`:""}

THEIR LIFE
${f.education?`Education: ${f.education}`:""}
${f.career?`Career: ${f.career}`:""}

WHO THEY WERE
${f.description?`How family describes them: ${f.description}`:""}
${f.ordinaryDay?`An ordinary day: ${f.ordinaryDay}`:""}
${f.quote?`Their quote or motto: "${f.quote}"`:""}

HOW THEY SPENT THEIR TIME
${f.freeTime?`Free time and passions: ${f.freeTime}`:""}

THEIR STORY
${f.memory?`A memory that captures them: ${f.memory}`:""}
${f.remember?`What family most wants remembered: ${f.remember}`:""}

FAMILY LISTING
${f.children?`Children: ${f.children}`:""}
${f.grandchildren?`Grandchildren: ${f.grandchildren}`:""}
${f.siblings?`Siblings: ${f.siblings}`:""}
${f.precededBy?`Preceded in death by: ${f.precededBy}`:""}
${f.otherFamily?`Also survived by: ${f.otherFamily}`:""}

${f.closingStatement?`CLOSING STATEMENT — reproduce these exact words verbatim as the final paragraph, after everything else including donations: "${f.closingStatement}"`:""}
${f.donation?`Memorial donations: ${f.donation}`:""}

Tone: ${toneMap[f.tone]}
Length: ${lenMap[f.length]}

FINAL CHECKLIST BEFORE WRITING:
- Every fact must trace directly to the family's input above
- Birth paragraph includes parents by name if parents field was provided
- Spouse introduced early with all provided marriage details
- No manner of death characterization
- No editorial bridge sentences
- Closing statement reproduced verbatim as the final paragraph
- Write only the obituary — no preamble, no explanation`;
}

function renderStep() {
  const f=state.form;
  const age=calcAge();
  const ag=ageGroup(age);
  const wrap=el("div",{});

  const ageBannerText={
    infant:"Based on the dates you've entered, we'll tailor these questions for an infant. Skip anything that doesn't apply.",
    child:`Based on the dates you've entered, we'll tailor these questions for a child (age ${age}). Skip anything that doesn't apply.`,
    teen:`Based on the dates you've entered, we'll tailor these questions for a teenager (age ${age}). Skip anything that doesn't apply.`,
    youngadult:`Based on the dates you've entered, we'll tailor these questions for a young adult (age ${age}). Skip anything that doesn't apply.`,
  };

  const ageBanner=(ag!=="adult"&&(f.dobYear||f.dodYear))?(()=>{ const b=el("div",{"class":"banner"}); b.textContent=ageBannerText[ag]; return b; })():null;
  const thoughtNote=(()=>{ const n=el("div",{"class":"thought-note"}); n.textContent="These are thought starters. Answer what feels useful, skip what doesn't. Nothing here is required."; return n; })();
  const skipNote=(()=>{ const n=el("div",{"class":"skip-note"}); n.textContent="Add what applies, skip what doesn't. There's no required structure here."; return n; })();

  // STEP 0 — The basics
  if (state.step===0) {
    wrap.appendChild(field("Full name","The only field we truly need to get started",inp("fullName","First, middle, last")));
    wrap.appendChild(field("Nickname or what family called them","If they were known by something other than their full name",inp("nickname",'e.g. Mom, Grandpa Joe, "Doc"')));
    wrap.appendChild(dateLocationBlock("Date and place of birth","dob","birthPlace","City, State or Country where they were born"));
    const ageDisp=el("div",{"class":"age-display","id":"age-display"});
    if (age!==null) { ageDisp.textContent=`Age at passing: ${age===0?"under 1 year":age}`; }
    else { ageDisp.style.display="none"; }
    wrap.appendChild(ageDisp);
    wrap.appendChild(dateLocationBlock("Date and place of passing","dod","deathPlace","City, State where they passed away"));
    wrap.appendChild(field("Where they lived","Their home at the time of passing",inp("city","City, State")));
    wrap.appendChild(field("How they were raised","Not just where — the environment, the people, what shaped them",ta("howRaised","e.g. Grew up in a small town in rural Georgia, one of five kids. Her mother kept a big garden and her father ran the hardware store on Main Street.",3)));
  }

  // STEP 1 — Family
  else if (state.step===1) {
    wrap.appendChild(skipNote);

    // ── Spouse toggle ──
    const spouseBlock = el("div",{"class":"field"});
    const spouseLbl = el("label",{}); spouseLbl.textContent="Did they have a spouse or partner?"; spouseBlock.appendChild(spouseLbl);
    const spouseToggle = el("div",{"class":"radio-inline"});
    [["yes","Yes"],["no","No"]].forEach(([v,l])=>{
      const lbl=el("label",{});
      const radio=el("input",{type:"radio",name:"hasSpouse"});
      radio.checked=f.hasSpouse===v;
      radio.addEventListener("change",()=>{ if(radio.checked){ set("hasSpouse",v); if(v==="no"){ set("spouse",""); set("howMet",""); set("spouseStatus","surviving"); } render(); } });
      lbl.appendChild(radio); lbl.appendChild(document.createTextNode(" "+l)); spouseToggle.appendChild(lbl);
    });
    spouseBlock.appendChild(spouseToggle);
    wrap.appendChild(spouseBlock);

    if (f.hasSpouse==="yes") {
      wrap.appendChild(field("Spouse or partner's name",null,inp("spouse","Full name")));
      const ri=el("div",{"class":"radio-inline"});
      [["surviving","Surviving"],["preceded","Preceded them in death"]].forEach(([v,l])=>{
        const lbl=el("label",{});
        const radio=el("input",{type:"radio",name:"spouseStatus"});
        radio.checked=f.spouseStatus===v;
        radio.addEventListener("change",()=>{ if(radio.checked) set("spouseStatus",v); });
        lbl.appendChild(radio); lbl.appendChild(document.createTextNode(" "+l)); ri.appendChild(lbl);
      });
      const statusField=el("div",{"class":"field"}); statusField.appendChild(ri); wrap.appendChild(statusField);
      wrap.appendChild(field("When and where did they meet and marry?","Include how long they were married if you know",ta("howMet","e.g. Met at a mutual friend's cookout in the summer of 1974. Married June 12, 1976 at First Presbyterian Church. Together 48 years.",2)));
    }

    // ── Children toggle ──
    const childBlock = el("div",{"class":"field"});
    const childLbl = el("label",{}); childLbl.textContent="Did they have children?"; childBlock.appendChild(childLbl);
    const childToggle = el("div",{"class":"radio-inline"});
    [["yes","Yes"],["no","No"]].forEach(([v,l])=>{
      const lbl=el("label",{});
      const radio=el("input",{type:"radio",name:"hasChildren"});
      radio.checked=f.hasChildren===v;
      radio.addEventListener("change",()=>{ if(radio.checked){ set("hasChildren",v); if(v==="no"){ set("children",""); set("grandchildren",""); } render(); } });
      lbl.appendChild(radio); lbl.appendChild(document.createTextNode(" "+l)); childToggle.appendChild(lbl);
    });
    childBlock.appendChild(childToggle);
    wrap.appendChild(childBlock);

    if (f.hasChildren==="yes") {
      wrap.appendChild(field("Children","Names, or 'four daughters' — include spouses in parentheses if you'd like",ta("children","e.g. daughters Anne (Patrick) and Carol; son James (Michelle)",2)));
      wrap.appendChild(field("Grandchildren and great-grandchildren",null,inp("grandchildren","e.g. seven grandchildren, or list names")));
    }

    wrap.appendChild(field("Siblings",null,inp("siblings","Names")));
    wrap.appendChild(field("Parents",null,inp("parents","e.g. born to Harold and Evelyn Marsh")));
    wrap.appendChild(field("Who preceded them in death?","Include anyone — parents, siblings, grandchildren, others. If your spouse's status is already indicated above, no need to include them here.",ta("precededBy","e.g. preceded in death by her parents and her sister Diane",2)));
    wrap.appendChild(field("Anyone else to mention?","Chosen family, close friends, beloved pets — all welcome",inp("otherFamily","e.g. many nieces and nephews, and her cat Oliver")));
  }

  // STEP 2 — Their life
  else if (state.step===2) {
    if (ageBanner) wrap.appendChild(ageBanner);
    if (ag==="infant") {
      wrap.appendChild(field("Any details about their birth or the time you had together",null,ta("career","Share whatever you'd like to include...",4)));
    } else {
      const edLabel=(ag==="child"||ag==="teen")?"School":"Education";
      const edHint=(ag==="child"||ag==="teen")?"School name, grade, activities they loved":"School, what they studied, year if relevant";
      const edPh=(ag==="child"||ag==="teen")?"e.g. Fourth grade at Riverside Elementary. Loved recess, reading, and anything to do with animals.":"e.g. Graduated from Ohio State in 1971 with a degree in accounting. Proud Buckeye his whole life.";
      wrap.appendChild(field(edLabel,edHint,ta("education",edPh,2)));
      if (ag!=="child") {
        wrap.appendChild(field("Career","What they did and how long — specific roles and places matter",ta("career","e.g. Spent 35 years as a nurse at St. Mary's Hospital, most of them in the ICU. Retired in 2018 but still volunteered at the free clinic on weekends.",3)));
      }
    }
  }

  // STEP 3 — Who they were
  else if (state.step===3) {
    wrap.appendChild(thoughtNote);
    wrap.appendChild(field("How would you describe them as a person?","A trait, a habit, something they always said or did — the more specific, the better",ta("description","e.g. She was the kind of person who remembered everyone's birthday and always showed up with exactly the right thing to say.",3)));
    wrap.appendChild(field("What did an ordinary day look like for them?","The real version — not the resume version",ta("ordinaryDay","e.g. Up by 5, coffee on the porch before anyone else was awake. Crossword done by 7. At the shop by 8, home for dinner every night at 6.",3)));
    wrap.appendChild(field("A quote, saying, or motto that was theirs","Something they lived by, often said, or that captures how they moved through the world",inp("quote",'"Just do the next right thing."')));
  }

  // STEP 4 — How they spent their time + Their story (combined)
  else if (state.step===4) {
    wrap.appendChild(thoughtNote);
    wrap.appendChild(field("How did they spend their free time?","Hobbies, passions, places, people — the more specific, the better",ta("freeTime","e.g. Gardening, especially her roses. Friday night poker with the same group of friends for 30 years. College football Saturdays. Cooking big Sunday dinners whether or not anyone was coming.",4)));
    wrap.appendChild(field("A specific memory or moment that captures who they were","The more specific, the better — time, place, detail",ta("memory","e.g. Every Saturday morning for 40 years, he made pancakes for whoever happened to be in the house. It didn't matter who. There were always enough.",4)));
    wrap.appendChild(field("What do you most want people to remember about them?",null,ta("remember","e.g. That he never left a room without making sure everyone in it felt seen.",3)));
    wrap.appendChild(field("A closing statement from your family","Something your family wants to say, in your own voice. One family wrote: \"She taught us that love is a verb, and she never stopped showing us how it was done.\" Yours doesn't need to be long — just true.",ta("closingStatement","Your family's words here...",3)));
    wrap.appendChild(field("Memorial or donation designation","If the family is directing donations to a cause or organization",inp("donation","e.g. American Foundation for Suicide Prevention, supporting.afsp.org")));
  }

  // STEP 5 — Preferences
  else if (state.step===5) {
    const toneField=el("div",{"class":"field"});
    const tl=el("label",{}); tl.textContent="Tone"; toneField.appendChild(tl);
    toneField.appendChild(radioCard("tone","warm","Warm and personal","Conversational, humanizing — written as if by someone who loved them"));
    toneField.appendChild(radioCard("tone","traditional","Traditional","Formal and reverent — suited for print in a newspaper"));
    toneField.appendChild(radioCard("tone","simple","Simple and honest","Quiet dignity, no flourishes — lets the facts carry the weight"));
    wrap.appendChild(toneField);
    const lenField=el("div",{"class":"field"});
    const ll=el("label",{}); ll.textContent="Length"; lenField.appendChild(ll);
    lenField.appendChild(radioCard("length","brief","Brief","150–200 words — for simple announcements or social media"));
    lenField.appendChild(radioCard("length","standard","Standard","250–350 words — most common for funeral programs and newspapers"));
    lenField.appendChild(radioCard("length","full","Full","400–500 words — when you want room to tell the story"));
    wrap.appendChild(lenField);
  }

  return wrap;
}

async function generate() {
  if (!state.form.fullName.trim()) { document.getElementById("err-msg").textContent="Please enter a full name to continue."; return; }
  const btn=document.getElementById("btn-generate");
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Writing the draft...';
  document.getElementById("err-msg").textContent="";
  try {
    const res=await fetch("/.netlify/functions/generate-obituary",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt:buildPrompt()})
    });
    const data=await res.json();
    if (data.error) throw new Error(data.error);
    state.obit=data.text; state.step=6; save(); render();
  } catch(e) {
    document.getElementById("err-msg").textContent=e.message||"Something went wrong. Please try again.";
    btn.disabled=false; btn.textContent="Generate draft →";
  }
}

function renderOutput() {
  const main=document.getElementById("main");
  document.getElementById("page-title").textContent="Your draft is ready";
  document.getElementById("page-subtitle").textContent="Edit anything that doesn't sound right — this is a place to start, not a final word";
  document.getElementById("progress").style.display="none";
  document.getElementById("footer-note").style.display="none";

  const card=el("div",{"class":"card wide"});
  const area=el("textarea",{"class":"output-area"});
  area.value=state.obit;
  area.addEventListener("input",()=>{ state.obit=area.value; save(); });
  card.appendChild(area);

  const btnGroup=el("div",{"class":"btn-group"});
  const copyBtn=el("button",{"class":"btn-primary"});
  copyBtn.textContent="Copy to clipboard";
  copyBtn.addEventListener("click",()=>{
    navigator.clipboard.writeText(state.obit).then(()=>{ copyBtn.textContent="Copied"; setTimeout(()=>copyBtn.textContent="Copy to clipboard",2000); });
  });
  const dlBtn=el("button",{"class":"btn-secondary"});
  dlBtn.textContent="Download .txt";
  dlBtn.addEventListener("click",()=>{
    const blob=new Blob([state.obit],{type:"text/plain"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url;
    a.download=(state.form.fullName.replace(/\s+/g,"_")||"obituary")+"_draft.txt";
    a.click(); URL.revokeObjectURL(url);
  });
  const backBtn=el("button",{"class":"btn-secondary"});
  backBtn.textContent="← Back and regenerate";
  backBtn.addEventListener("click",()=>{ state.step=5; render(); });
  const clearBtn=el("button",{"class":"btn-ghost"});
  clearBtn.textContent="Start over";
  clearBtn.addEventListener("click",()=>{
    if (confirm("Start over and clear all your answers?")) {
      state={step:0,form:{...INIT},obit:""};
      try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
      render();
    }
  });
  btnGroup.appendChild(copyBtn); btnGroup.appendChild(dlBtn);
  btnGroup.appendChild(backBtn); btnGroup.appendChild(clearBtn);
  card.appendChild(btnGroup);

  const note=el("p",{"class":"output-note"});
  note.textContent="Read it out loud. Change anything that doesn't sound like them. The best obituaries are written by the people who knew them — this is just a way to get started.";
  card.appendChild(note);
  main.innerHTML=""; main.appendChild(card);
}

function renderProgress() {
  const p=document.getElementById("progress"); if (!p) return;
  p.innerHTML="";
  STEP_NAMES.forEach((name,i)=>{
    const dot=el("div",{"class":i<state.step?"progress-dot done":i===state.step?"progress-dot active":"progress-dot"});
    dot.textContent=i<state.step?"✓":String(i+1); dot.title=name;
    if (i<state.step) dot.addEventListener("click",()=>{ state.step=i; render(); });
    p.appendChild(dot);
    if (i<STEP_NAMES.length-1) {
      const line=el("div",{"class":i<state.step?"progress-line done":"progress-line"});
      p.appendChild(line);
    }
  });
}

function render() {
  if (state.step===6) { renderOutput(); return; }
  document.getElementById("page-title").textContent="Obituary writer";
  document.getElementById("page-subtitle").textContent="Answer what you can. Skip what you can't. We'll build something from what you give us.";
  document.getElementById("footer-note").style.display="";
  document.getElementById("progress").style.display="";
  renderProgress();

  const main=document.getElementById("main"); main.innerHTML="";
  const card=el("div",{"class":"card"});
  const stepLabel=el("div",{"class":"step-label"});
  stepLabel.textContent=`Step ${state.step+1} of ${STEP_NAMES.length}`;
  card.appendChild(stepLabel);
  const stepTitle=el("div",{"class":"step-title"});
  stepTitle.textContent=STEP_NAMES[state.step];
  card.appendChild(stepTitle);
  card.appendChild(renderStep());

  const nav=el("div",{"class":"nav"});
  const backBtn=el("button",{"class":state.step===0?"btn-back hidden":"btn-back"});
  backBtn.textContent="← Back";
  backBtn.addEventListener("click",()=>{ if(state.step>0){ state.step--; render(); } });
  nav.appendChild(backBtn);

  if (state.step<STEP_NAMES.length-1) {
    const nextBtn=el("button",{"class":"btn-next"});
    nextBtn.textContent="Continue →";
    nextBtn.addEventListener("click",()=>{ state.step++; render(); save(); });
    nav.appendChild(nextBtn);
  } else {
    const genBtn=el("button",{"class":"btn-next",id:"btn-generate"});
    genBtn.textContent="Generate draft →";
    genBtn.addEventListener("click",generate);
    nav.appendChild(genBtn);
  }
  card.appendChild(nav);
  const errMsg=el("p",{"class":"err",id:"err-msg"}); card.appendChild(errMsg);
  main.appendChild(card);
}

const restored=load();
if (restored) {
  const rm=document.getElementById("restored-msg");
  rm.style.display="block";
  setTimeout(()=>rm.style.display="none",4000);
}
render();
</script>
