<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obituary Writer — Leo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --card: #FDFAF5;
    --terra: #C1674A;
    --terra-light: #F5EAE5;
    --terra-deep: #9E4E35;
    --dark: #2C2A26;
    --mid: #6B6157;
    --muted: #9A8F83;
    --border: #DDD4C8;
  }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    padding: 2.5rem 1.5rem 3rem;
  }

  .header { text-align: center; margin-bottom: 2rem; }
  .header-logo { font-size: 10px; letter-spacing: 0.25em; color: var(--terra); text-transform: uppercase; margin-bottom: 0.5rem; font-weight: 600; }
  .header h1 { font-size: 26px; font-weight: 600; margin-bottom: 0.4rem; }
  .header p { font-size: 15px; color: var(--muted); font-style: italic; }

  .progress { display: flex; justify-content: center; align-items: center; gap: 4px; margin-bottom: 2rem; flex-wrap: wrap; }
  .progress-dot {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; cursor: default;
    background: var(--border); color: var(--muted);
    transition: all 0.2s;
  }
  .progress-dot.active { background: var(--terra); color: #fff; }
  .progress-dot.done { background: var(--terra); color: #fff; opacity: 0.65; cursor: pointer; }
  .progress-line { width: 14px; height: 1px; background: var(--border); opacity: 0.4; }
  .progress-line.done { background: var(--terra); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem 2rem 1.75rem;
    max-width: 580px;
    margin: 0 auto;
  }
  .card.wide { max-width: 640px; }

  .step-label { font-size: 10px; letter-spacing: 0.18em; color: var(--terra); text-transform: uppercase; margin-bottom: 0.4rem; font-weight: 600; }
  .step-title { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }

  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 3px; letter-spacing: 0.01em; }
  .field .hint { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-style: italic; line-height: 1.5; }

  input[type=text], input[type=date], input[type=url], textarea {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 15px; font-family: inherit;
    background: var(--cream); color: var(--dark);
    outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, input[type=date]:focus, input[type=url]:focus, textarea:focus { border-color: var(--terra); }
  textarea { resize: vertical; line-height: 1.6; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .age-display { font-size: 13px; color: var(--muted); font-style: italic; margin-top: -0.75rem; margin-bottom: 1.25rem; }

  .banner {
    background: var(--terra-light); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 1.5rem;
    font-size: 13px; color: var(--terra-deep);
    font-style: italic; line-height: 1.6;
  }

  .thought-note {
    background: var(--terra-light); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 1.5rem;
    font-size: 13px; color: var(--terra-deep);
    font-style: italic; line-height: 1.6;
  }

  .skip-note { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 1.5rem; line-height: 1.6; }

  .radio-card {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; margin-bottom: 8px;
    border: 1.5px solid var(--border); border-radius: 9px;
    cursor: pointer; transition: all 0.15s;
  }
  .radio-card:hover { border-color: var(--terra); }
  .radio-card.selected { border-color: var(--terra); background: var(--terra-light); }
  .radio-dot {
    width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    border: 2px solid var(--border); background: transparent; transition: all 0.15s;
  }
  .radio-card.selected .radio-dot { border-color: var(--terra); background: var(--terra); }
  .radio-label { font-size: 14px; font-weight: 500; color: var(--dark); }
  .radio-desc { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 2px; line-height: 1.4; }

  .radio-inline { display: flex; gap: 20px; margin-top: 9px; }
  .radio-inline label { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--mid); cursor: pointer; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .btn-back {
    padding: 9px 20px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--mid); font-size: 14px; font-family: inherit; cursor: pointer;
  }
  .btn-back:hover { border-color: var(--terra-deep); }
  .btn-back.hidden { visibility: hidden; }
  .btn-next {
    padding: 10px 24px; border-radius: 8px; border: none;
    background: var(--terra); color: #fff; font-size: 14px; font-family: inherit; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-next:hover { background: var(--terra-deep); }
  .btn-next:disabled { background: var(--muted); cursor: default; }

  .err { color: var(--terra); font-size: 13px; margin-top: 0.75rem; text-align: right; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .output-area {
    width: 100%; min-height: 420px; padding: 14px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 16px; font-family: inherit;
    background: var(--cream); color: var(--dark);
    outline: none; resize: vertical; line-height: 1.85;
  }
  .output-area:focus { border-color: var(--terra); }

  .btn-group { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn-primary { padding: 10px 22px; border-radius: 8px; border: none; background: var(--terra); color: #fff; font-size: 14px; font-family: inherit; cursor: pointer; }
  .btn-primary:hover { background: var(--terra-deep); }
  .btn-secondary { padding: 10px 22px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--mid); font-size: 14px; font-family: inherit; cursor: pointer; }
  .btn-secondary:hover { border-color: var(--terra); }
  .btn-ghost { padding: 10px 22px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 14px; font-family: inherit; cursor: pointer; }

  .output-note { font-size: 12px; color: var(--muted); margin-top: 1.25rem; font-style: italic; line-height: 1.6; border-top: 1px solid var(--border); padding-top: 1rem; }

  .footer-note { text-align: center; font-size: 12px; color: var(--muted); margin-top: 1.5rem; font-style: italic; }

  .restored-msg { text-align: center; margin-bottom: 0.75rem; font-size: 12px; color: var(--terra); font-style: italic; }

  @media (max-width: 480px) {
    body { padding: 1.5rem 1rem 2rem; }
    .two-col { grid-template-columns: 1fr; }
    .card { padding: 1.5rem 1.25rem; }
  }
</style>
</head>
<body>

<div id="restored-msg" class="restored-msg" style="display:none">Your previous progress has been restored.</div>

<div class="header">
  <div class="header-logo">Leo</div>
  <h1 id="page-title">Obituary writer</h1>
  <p id="page-subtitle">Answer what you can. Skip what you can't. We'll build something from what you give us.</p>
</div>

<div class="progress" id="progress"></div>
<div id="main"></div>
<p class="footer-note" id="footer-note">Your progress saves automatically. Nothing you enter is shared or stored beyond this device.</p>

<script>
const STEP_NAMES = ["The basics","Their life","Who they were","How they spent their time","Family","Their story","Services","Preferences"];
const STORAGE_KEY = "leo-obit-v1";

const INIT = {
  fullName:"",nickname:"",dob:"",dod:"",city:"",howRaised:"",existingMaterial:"",
  education:"",career:"",military:"",community:"",
  description:"",ordinaryDay:"",proudOf:"",quote:"",
  freeTime:"",relationships:"",
  spouse:"",spouseStatus:"surviving",howMet:"",children:"",grandchildren:"",
  siblings:"",parents:"",precededBy:"",otherFamily:"",
  memory:"",remember:"",closingStatement:"",donation:"",
  viewing:"",funeral:"",burial:"",livestream:"",
  tone:"warm",length:"standard"
};

let state = { step: 0, form: {...INIT}, obit: "" };

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.form) { state = saved; return true; }
    }
  } catch(e){}
  return false;
}

function calcAge(dob, dod) {
  if (!dob || !dod) return null;
  const b = new Date(dob), d = new Date(dod);
  if (d - b < 0) return null;
  let y = d.getFullYear() - b.getFullYear();
  const m = d.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && d.getDate() < b.getDate())) y--;
  return y;
}

function ageGroup(age) {
  if (age === null) return "adult";
  if (age < 1) return "infant";
  if (age <= 12) return "child";
  if (age <= 17) return "teen";
  if (age <= 25) return "youngadult";
  return "adult";
}

function set(k, v) { state.form[k] = v; save(); }

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "class") e.className = v;
    else if (k === "for") e.htmlFor = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

function inp(f, placeholder, type="text") {
  const i = el("input", {type, placeholder});
  i.value = state.form[f] || "";
  i.addEventListener("input", () => { set(f, i.value); if (f==="dob"||f==="dod") renderProgress(); });
  return i;
}

function ta(f, placeholder, rows=3) {
  const t = el("textarea", {rows, placeholder});
  t.value = state.form[f] || "";
  t.addEventListener("input", () => set(f, t.value));
  return t;
}

function field(labelText, hintText, inputEl) {
  const d = el("div", {"class":"field"});
  if (labelText) { const l = el("label", {}); l.textContent = labelText; d.appendChild(l); }
  if (hintText) { const h = el("div", {"class":"hint"}); h.textContent = hintText; d.appendChild(h); }
  if (inputEl) d.appendChild(inputEl);
  return d;
}

function radioCard(fk, value, labelText, descText) {
  const d = el("div", {"class": state.form[fk]===value ? "radio-card selected" : "radio-card"});
  const dot = el("div", {"class":"radio-dot"});
  const txt = el("div", {});
  const lbl = el("div", {"class":"radio-label"}); lbl.textContent = labelText;
  const dsc = el("div", {"class":"radio-desc"}); dsc.textContent = descText;
  txt.appendChild(lbl); txt.appendChild(dsc);
  d.appendChild(dot); d.appendChild(txt);
  d.addEventListener("click", () => { set(fk, value); render(); });
  return d;
}

function buildPrompt() {
  const f = state.form;
  const age = calcAge(f.dob, f.dod);
  const ag = ageGroup(age);
  const toneMap = {
    warm: "warm, personal, and conversational — written as if by someone who deeply loved them",
    traditional: "traditional, reverent, and formal — appropriate for print in a newspaper",
    simple: "simple, honest, and quietly dignified — no flourishes, lets the details speak"
  };
  const lenMap = {
    brief: "approximately 150–200 words",
    standard: "approximately 250–350 words",
    full: "approximately 400–500 words"
  };
  return `You are helping a grieving family write an obituary in the first days after losing someone they love. Write with care, warmth, and specificity. Use the details provided to bring this person to life on the page. Write in third person.

${age !== null ? `Age at passing: ${age === 0 ? "under 1 year old (infant)" : age}` : ""}

BASICS
Full name: ${f.fullName}
${f.nickname ? `Known as: ${f.nickname}` : ""}
${f.dob ? `Born: ${f.dob}` : ""}${f.dod ? ` | Passed: ${f.dod}` : ""}
${f.city ? `Lived in: ${f.city}` : ""}
${f.howRaised ? `How they were raised: ${f.howRaised}` : ""}
${f.existingMaterial ? `Existing material to weave in: ${f.existingMaterial}` : ""}

THEIR LIFE
${f.education ? `Education: ${f.education}` : ""}
${f.career ? `Career: ${f.career}` : ""}
${f.military ? `Military service: ${f.military}` : ""}
${f.community ? `Community involvement: ${f.community}` : ""}

WHO THEY WERE
${f.description ? `How family describes them: ${f.description}` : ""}
${f.ordinaryDay ? `An ordinary day: ${f.ordinaryDay}` : ""}
${f.proudOf ? `Most proud of: ${f.proudOf}` : ""}
${f.quote ? `Their quote or motto: "${f.quote}"` : ""}

HOW THEY SPENT THEIR TIME
${f.freeTime ? `Free time: ${f.freeTime}` : ""}
${f.relationships ? `Stories about relationships: ${f.relationships}` : ""}

FAMILY
${f.spouse ? `${f.spouseStatus === "surviving" ? "Survived by spouse" : "Preceded in death by spouse"}: ${f.spouse}` : ""}
${f.howMet ? `How they met and married: ${f.howMet}` : ""}
${f.children ? `Children: ${f.children}` : ""}
${f.grandchildren ? `Grandchildren: ${f.grandchildren}` : ""}
${f.siblings ? `Siblings: ${f.siblings}` : ""}
${f.parents ? `Parents: ${f.parents}` : ""}
${f.precededBy ? `Preceded in death by: ${f.precededBy}` : ""}
${f.otherFamily ? `Also survived by: ${f.otherFamily}` : ""}

THEIR STORY
${f.memory ? `A memory that captures them: ${f.memory}` : ""}
${f.remember ? `What family most wants remembered: ${f.remember}` : ""}
${f.closingStatement ? `Family closing statement — include verbatim as the final paragraph: "${f.closingStatement}"` : ""}
${f.donation ? `Memorial donations: ${f.donation}` : ""}

SERVICES
${f.viewing ? `Viewing: ${f.viewing}` : ""}
${f.funeral ? `Funeral/memorial service: ${f.funeral}` : ""}
${f.burial ? `Burial: ${f.burial}` : ""}
${f.livestream ? `Livestream: ${f.livestream}` : ""}

Tone: ${toneMap[f.tone]}
Length: ${lenMap[f.length]}

INSTRUCTIONS
- Write a complete, publication-ready obituary. Lead with the person's full name.
- Use specific details where provided. Specificity is what makes an obituary worth keeping.
- If a family closing statement is provided, include it verbatim as the final paragraph.
- If memorial donations are provided, include at the close.
- Include service details at the end if provided.
- For infants or very young children, center the story around the family, the anticipation, and the brief time together.
- Write only the obituary — no preamble, no meta-commentary, no explanation.`;
}

function renderProgress() {
  const p = document.getElementById("progress");
  if (!p) return;
  p.innerHTML = "";
  STEP_NAMES.forEach((name, i) => {
    const dot = el("div", {"class": i < state.step ? "progress-dot done" : i === state.step ? "progress-dot active" : "progress-dot"});
    dot.textContent = i < state.step ? "✓" : String(i+1);
    dot.title = name;
    if (i < state.step) dot.addEventListener("click", () => { state.step = i; render(); });
    p.appendChild(dot);
    if (i < STEP_NAMES.length - 1) {
      const line = el("div", {"class": i < state.step ? "progress-line done" : "progress-line"});
      p.appendChild(line);
    }
  });
}

function renderStep() {
  const f = state.form;
  const age = calcAge(f.dob, f.dod);
  const ag = ageGroup(age);
  const wrap = el("div", {});

  const ageBannerText = {
    infant: "Based on the dates you've entered, we'll tailor these questions for an infant. Skip anything that doesn't apply.",
    child: `Based on the dates you've entered, we'll tailor these questions for a child (age ${age}). Skip anything that doesn't apply.`,
    teen: `Based on the dates you've entered, we'll tailor these questions for a teenager (age ${age}). Skip anything that doesn't apply.`,
    youngadult: `Based on the dates you've entered, we'll tailor these questions for a young adult (age ${age}). Skip anything that doesn't apply.`,
  };

  const ageBanner = (ag !== "adult" && f.dob && f.dod) ? (() => { const b = el("div",{"class":"banner"}); b.textContent = ageBannerText[ag]; return b; })() : null;
  const thoughtNote = (() => { const n = el("div",{"class":"thought-note"}); n.textContent = "These are thought starters. Answer what feels useful, skip what doesn't. Nothing here is required."; return n; })();
  const skipNote = (() => { const n = el("div",{"class":"skip-note"}); n.textContent = "Add what applies, skip what doesn't. There's no required structure here."; return n; })();

  if (state.step === 0) {
    wrap.appendChild(field("Full name", "The only field we truly need to get started", inp("fullName","First, middle, last")));
    wrap.appendChild(field("Nickname or what family called them","If they were known by something other than their full name", inp("nickname",'e.g. Dad, Grandma Bette, "Coach"')));
    const twoCol = el("div",{"class":"two-col"});
    twoCol.appendChild(field("Date of birth", null, inp("dob","","date")));
    twoCol.appendChild(field("Date of passing", null, inp("dod","","date")));
    wrap.appendChild(twoCol);
    if (age !== null) { const ad = el("div",{"class":"age-display"}); ad.textContent = `Age at passing: ${age === 0 ? "under 1 year" : age}`; wrap.appendChild(ad); }
    wrap.appendChild(field("Where they lived", null, inp("city","City, State")));
    wrap.appendChild(field("How they were raised","Not just where — the environment, the people, what shaped them", ta("howRaised","e.g. Grew up on a cattle farm in Richmond, Utah, the youngest of four. Learned to work hard before he could drive.",3)));
    wrap.appendChild(field("Is there anything already written about them we should use?","A theater bio, retirement tribute, program note, LinkedIn summary — paste it here and we'll weave it in", ta("existingMaterial","Paste anything written about them here...",3)));
  }

  else if (state.step === 1) {
    if (ageBanner) wrap.appendChild(ageBanner);
    if (ag === "infant") {
      wrap.appendChild(field("Any details about their birth or the time you had together", null, ta("career","Share whatever you'd like to include...",4)));
    } else {
      const edLabel = (ag === "child" || ag === "teen") ? "School" : "Education";
      const edHint = (ag === "child" || ag === "teen") ? "School name, grade, activities they loved" : "School, what they studied, year if relevant";
      const edPh = (ag === "child" || ag === "teen") ? "e.g. Fifth grade at Jefferson Elementary. Loved art class and soccer." : "e.g. Attended Utah State University, studied Parks and Recreation Management, graduated 1983";
      wrap.appendChild(field(edLabel, edHint, ta("education", edPh, 2)));
      if (ag !== "child") {
        wrap.appendChild(field("Career","What they did and how long — specific roles and places matter", ta("career","e.g. Taught elementary school for 44 years across Cache Valley, retiring from White Pine Middle School in 2012",3)));
      }
      wrap.appendChild(field("Military service","Branch, years served — or leave blank", inp("military","e.g. U.S. Army veteran, served 1968–1971")));
      wrap.appendChild(field("Community involvement, organizations, or leadership", null, ta("community","e.g. Served as Bishop three times, coached youth soccer for 20 years, president of NUU Soccer",3)));
    }
  }

  else if (state.step === 2) {
    wrap.appendChild(thoughtNote);
    wrap.appendChild(field("How would you describe them as a person?","A trait, a habit, something they always said or did — the more specific, the better", ta("description","e.g. He never judged anyone. Would drop everything to help someone in need, and he meant it every time.",3)));
    wrap.appendChild(field("What did an ordinary day look like for them?","The real version — not the resume version", ta("ordinaryDay","e.g. Up early, coffee and crossword in pen, kids out the door, then the ranch. Always had the game on in the background.",3)));
    wrap.appendChild(field("What were they most proud of?", null, ta("proudOf","e.g. Her three kids. The business he built from nothing. Forty-two years of marriage.",2)));
    wrap.appendChild(field("A quote, saying, or motto that was theirs","Something they lived by, often said, or that captures how they moved through the world", inp("quote",'"Be curious, not judgmental."')));
  }

  else if (state.step === 3) {
    wrap.appendChild(thoughtNote);
    wrap.appendChild(field("How did they spend their free time?","Hobbies, passions, places — the more specific, the better", ta("freeTime","e.g. Coaching soccer and basketball, riding four-wheelers in the mountains, Disneyland trips with the family, Chick-fil-A runs with his brothers",3)));
    wrap.appendChild(field("Any stories about their relationships that are worth sharing?","A friendship, someone they mentored, someone they showed up for — the kind of story that shows who they were to other people", ta("relationships","e.g. He coached dozens of youth teams over the years, sometimes four different age groups in a single season. The kids called him Coach Brad long after they'd grown up.",4)));
  }

  else if (state.step === 4) {
    wrap.appendChild(skipNote);
    wrap.appendChild(field("Spouse or partner", null, inp("spouse","Name")));
    if (f.spouse) {
      const ri = el("div",{"class":"radio-inline"});
      [["surviving","Surviving"],["preceded","Preceded them in death"]].forEach(([v,l]) => {
        const lbl = el("label",{});
        const radio = el("input",{type:"radio",name:"spouseStatus"});
        radio.checked = f.spouseStatus === v;
        radio.addEventListener("change", () => { if(radio.checked) { set("spouseStatus",v); } });
        lbl.appendChild(radio);
        lbl.appendChild(document.createTextNode(" "+l));
        ri.appendChild(lbl);
      });
      const fd = el("div",{"class":"field"}); fd.appendChild(ri); wrap.appendChild(fd);
      wrap.appendChild(field("How and when did they meet? When and where did they marry?","These details carry more weight than you might expect", ta("howMet","e.g. Met at Utah State University. Married September 8, 1967 in the Salt Lake LDS Temple. Married 42 years.",2)));
    }
    wrap.appendChild(field("Children","Names, or 'four daughters' — include spouses in parentheses if you'd like", ta("children","e.g. sons Mark (Jennifer) and David; daughter Sarah (Tom)",2)));
    wrap.appendChild(field("Grandchildren and great-grandchildren", null, inp("grandchildren","e.g. 16 grandchildren and two great-grandchildren, or list names")));
    wrap.appendChild(field("Siblings", null, ta("siblings","Names",2)));
    wrap.appendChild(field("Parents", null, inp("parents","e.g. born to Reed and Venna Tippetts")));
    wrap.appendChild(field("Who preceded them in death?","Include anyone — parents, siblings, grandchildren, a spouse, others", ta("precededBy","e.g. preceded in death by her husband Wyn, her parents, her brother Michael, and her grandson Braxton",2)));
    wrap.appendChild(field("Anyone else to mention?","Chosen family, close friends, nieces and nephews, beloved pets — all welcome here", inp("otherFamily","e.g. many nieces and nephews, and her dog Murphy")));
  }

  else if (state.step === 5) {
    wrap.appendChild(thoughtNote);
    wrap.appendChild(field("A specific memory or moment that captures who they were","The more specific, the better — time, place, detail", ta("memory","e.g. Every Sunday, without fail, he'd be at the kitchen table by 6 a.m. with a pot of black coffee and the crossword — always in pen.",4)));
    wrap.appendChild(field("What do you most want people to remember about them?", null, ta("remember","e.g. That she made everyone feel like they were the most important person in the room.",3)));
    wrap.appendChild(field("A closing statement from your family",'Something your family wants to say, in your own voice. Wyn\'s family wrote: "Wyn taught us all unconditional love, service and hard work." Yours doesn\'t need to be long — just true.', ta("closingStatement","Your family's words here...",3)));
    wrap.appendChild(field("Memorial or donation designation","If the family is directing donations to a cause or organization", inp("donation","e.g. American Foundation for Suicide Prevention, supporting.afsp.org")));
  }

  else if (state.step === 6) {
    const sn = el("div",{"class":"skip-note"}); sn.textContent = "Skip anything that isn't confirmed yet — you can always add these details to the draft before you use it."; wrap.appendChild(sn);
    wrap.appendChild(field("Viewing or wake","Location, date, time", ta("viewing","e.g. Friday, January 24th, 6:00–8:00 pm at the Highland 6th Ward, 6050 W Chapel Drive, Highland, Utah",2)));
    wrap.appendChild(field("Funeral or memorial service","Location, date, time", ta("funeral","e.g. Saturday, January 25th at 11:00 am at the same location",2)));
    wrap.appendChild(field("Burial or interment", null, inp("burial","e.g. Interment to follow at Highland Cemetery")));
    wrap.appendChild(field("Livestream link","If the service will be streamed online", inp("livestream","https://...")));
  }

  else if (state.step === 7) {
    const toneField = el("div",{"class":"field"});
    const tl = el("label",{}); tl.textContent = "Tone"; toneField.appendChild(tl);
    toneField.appendChild(radioCard("tone","warm","Warm and personal","Conversational, humanizing — written as if by someone who loved them"));
    toneField.appendChild(radioCard("tone","traditional","Traditional","Formal and reverent — suited for print in a newspaper"));
    toneField.appendChild(radioCard("tone","simple","Simple and honest","Quiet dignity, no flourishes — lets the facts carry the weight"));
    wrap.appendChild(toneField);

    const lenField = el("div",{"class":"field"});
    const ll = el("label",{}); ll.textContent = "Length"; lenField.appendChild(ll);
    lenField.appendChild(radioCard("length","brief","Brief","150–200 words — for simple announcements or social media"));
    lenField.appendChild(radioCard("length","standard","Standard","250–350 words — most common for funeral programs and newspapers"));
    lenField.appendChild(radioCard("length","full","Full","400–500 words — when you want room to tell the story"));
    wrap.appendChild(lenField);
  }

  return wrap;
}

async function generate() {
  if (!state.form.fullName.trim()) {
    document.getElementById("err-msg").textContent = "Please enter a full name to continue.";
    return;
  }
  const btn = document.getElementById("btn-generate");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Writing the draft...';
  document.getElementById("err-msg").textContent = "";

  try {
    const res = await fetch("/.netlify/functions/generate-obituary", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: buildPrompt() })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.obit = data.text;
    state.step = 8;
    save();
    render();
  } catch(e) {
    document.getElementById("err-msg").textContent = e.message || "Something went wrong. Please try again.";
    btn.disabled = false;
    btn.textContent = "Generate draft →";
  }
}

function renderOutput() {
  const main = document.getElementById("main");
  const footer = document.getElementById("footer-note");
  const pageTitle = document.getElementById("page-title");
  const pageSub = document.getElementById("page-subtitle");
  const progress = document.getElementById("progress");

  pageTitle.textContent = "Your draft is ready";
  pageSub.textContent = "Edit anything that doesn't sound right — this is a place to start, not a final word";
  progress.style.display = "none";
  footer.style.display = "none";

  const card = el("div",{"class":"card wide"});
  const area = el("textarea",{"class":"output-area"});
  area.value = state.obit;
  area.addEventListener("input", () => { state.obit = area.value; save(); });
  card.appendChild(area);

  const btnGroup = el("div",{"class":"btn-group"});

  const copyBtn = el("button",{"class":"btn-primary"});
  copyBtn.textContent = "Copy to clipboard";
  copyBtn.addEventListener("click", () => {
    navigator.clipboard.writeText(state.obit).then(() => {
      copyBtn.textContent = "Copied"; setTimeout(() => copyBtn.textContent = "Copy to clipboard", 2000);
    });
  });

  const dlBtn = el("button",{"class":"btn-secondary"});
  dlBtn.textContent = "Download .txt";
  dlBtn.addEventListener("click", () => {
    const blob = new Blob([state.obit], {type:"text/plain"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (state.form.fullName.replace(/\s+/g,"_") || "obituary") + "_draft.txt";
    a.click(); URL.revokeObjectURL(url);
  });

  const backBtn = el("button",{"class":"btn-secondary"});
  backBtn.textContent = "← Back and regenerate";
  backBtn.addEventListener("click", () => { state.step = 7; render(); });

  const clearBtn = el("button",{"class":"btn-ghost"});
  clearBtn.textContent = "Start over";
  clearBtn.addEventListener("click", () => {
    if (confirm("Start over and clear all your answers?")) {
      state = { step: 0, form: {...INIT}, obit: "" };
      try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
      render();
    }
  });

  btnGroup.appendChild(copyBtn); btnGroup.appendChild(dlBtn);
  btnGroup.appendChild(backBtn); btnGroup.appendChild(clearBtn);
  card.appendChild(btnGroup);

  const note = el("p",{"class":"output-note"});
  note.textContent = "Read it out loud. Change anything that doesn't sound like them. The best obituaries are written by the people who knew them — this is just a way to get started.";
  card.appendChild(note);

  main.innerHTML = "";
  main.appendChild(card);
}

function render() {
  if (state.step === 8) { renderOutput(); return; }

  document.getElementById("page-title").textContent = "Obituary writer";
  document.getElementById("page-subtitle").textContent = "Answer what you can. Skip what you can't. We'll build something from what you give us.";
  document.getElementById("footer-note").style.display = "";
  document.getElementById("progress").style.display = "";
  renderProgress();

  const main = document.getElementById("main");
  main.innerHTML = "";

  const card = el("div",{"class":"card"});

  const stepLabel = el("div",{"class":"step-label"});
  stepLabel.textContent = `Step ${state.step + 1} of ${STEP_NAMES.length}`;
  card.appendChild(stepLabel);

  const stepTitle = el("div",{"class":"step-title"});
  stepTitle.textContent = STEP_NAMES[state.step];
  card.appendChild(stepTitle);

  card.appendChild(renderStep());

  const nav = el("div",{"class":"nav"});

  const backBtn = el("button",{"class": state.step === 0 ? "btn-back hidden" : "btn-back"});
  backBtn.textContent = "← Back";
  backBtn.addEventListener("click", () => { if (state.step > 0) { state.step--; render(); } });
  nav.appendChild(backBtn);

  if (state.step < STEP_NAMES.length - 1) {
    const nextBtn = el("button",{"class":"btn-next"});
    nextBtn.textContent = "Continue →";
    nextBtn.addEventListener("click", () => { state.step++; render(); save(); });
    nav.appendChild(nextBtn);
  } else {
    const genBtn = el("button",{"class":"btn-next", id:"btn-generate"});
    genBtn.textContent = "Generate draft →";
    genBtn.addEventListener("click", generate);
    nav.appendChild(genBtn);
  }

  card.appendChild(nav);

  const errMsg = el("p",{"class":"err", id:"err-msg"});
  card.appendChild(errMsg);

  main.appendChild(card);
}

const restored = load();
if (restored) {
  const rm = document.getElementById("restored-msg");
  rm.style.display = "block";
  setTimeout(() => rm.style.display = "none", 4000);
}
render();
</script>
